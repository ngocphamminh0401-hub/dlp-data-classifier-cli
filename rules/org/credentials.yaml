# ORG-005 — Thông tin xác thực / Credentials (passwords, API keys, tokens)
# Vi phạm nghiêm trọng nhất trong data leak — một mình credential đủ để xâm nhập hệ thống.
# Áp dụng cho: source code, file .env, config, log, tài liệu kỹ thuật.
#
# NGUYÊN TẮC PHÁT HIỆN:
#   1. Label-first: chỉ match khi có label rõ ràng (password=, api_key=, ...)
#   2. Giá trị phải đủ dài (≥ 8 ký tự) để loại trừ placeholder
#   3. Loại trừ giá trị placeholder phổ biến: "changeme", "your_password", "***", "..."
#
# Lưu ý: Không match token/key trong comment (vd: # password = xxx trong code review).
# Engine nên xem xét context line để phân biệt assignment vs comment.

id: credentials_001
name: "ORG-005 Thông tin kết nối DB / credentials"
category: org
level: SECRET
weight: 0.95
priority: 97
tags: [org, credentials, password, api_key, token, secret, security_critical]
enabled: true

patterns:
  - regex: '(?i)(?:password|passwd|pwd|secret|api[_\-]?key|token|connection[_\-]?string|db[_\-]?pass)\s*[:=]\s*["'']?[^\s"'']{6,}["'']?'
    description: "ORG-005 theo spec PDF"
    confidence: 0.92
    context_required: false

keywords:
  primary:
    - "password"
    - "passwd"
    - "secret"
    - "api_key"
    - "access_token"
    - "private_key"
    - "mật khẩu"
    - "credentials"
    - "authentication"
    - "client_secret"
    - "refresh_token"
    - "bearer"
    - "oauth"
    - "aws_access_key"
    - "AKID"
    - "AKIA"
    - "service_account_key"
    - "private_key_id"
    - "CLIENT_SECRET"
    - "REFRESH_TOKEN"
    - "AWS_SECRET"
    - "AWS_ACCESS_KEY_ID"
  secondary:
    - "token"
    - "api"
    - "key"
    - "auth"
    - ".env"
    - "config"
    - "connection string"
    - "database"
    - "login"
    - "xác thực"
    - "đăng nhập"
    - "oauth2"
    - "authorization"
    - "scope"
    - "grant_type"
    - "sk_live"
    - "sk_test"
    - "rsa"
    - "BEGIN PRIVATE KEY"
    - "BEGIN RSA PRIVATE KEY"

false_positive_reduction:
  min_context_window: 0
  exclude_if_no_keywords: false
  # Pattern tự nhận dạng qua label — không cần keyword riêng
