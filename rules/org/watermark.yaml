# ORG-006 — Watermark nội bộ / Nhãn lưu hành hạn chế
# Phát hiện nhãn watermark văn bản chỉ ra tài liệu chỉ dùng nội bộ.
# Thường xuất hiện ở: header/footer văn bản, background watermark PDF,
# tiêu đề slide PowerPoint, ghi chú trong email.
#
# Strategy: Pattern match toàn cụm từ (multi-word), không match từng từ riêng lẻ.
# Vd: "nội bộ" riêng lẻ quá chung chung → "chỉ lưu hành nội bộ" mới đặc trưng.

id: watermark_001
name: "Watermark nội bộ / nhãn lưu hành hạn chế"
category: org
level: INTERNAL
weight: 0.85
priority: 45
tags: [org, watermark, internal_label, distribution_control]
enabled: true

patterns:
  # Cụm từ chỉ lưu hành nội bộ đầy đủ — tín hiệu rất mạnh
  - regex: '(?i)(?:chỉ\s*lưu\s*hành\s*nội\s*bộ|internal\s*use\s*only|do\s*not\s*distribute|for\s*internal\s*use\s*only)'
    description: "ORG-006a nhãn lưu hành nội bộ đầy đủ"
    confidence: 0.93
    context_required: false

  # Nhãn "Phân loại: INTERNAL" hoặc "Phân loại: NỘI BỘ" — rất đặc trưng
  - regex: '(?i)(?:phân\s*loại|classification|label)\s*[:=—\-]\s*(?:INTERNAL|NỘI\s*BỘ)\b'
    description: "ORG-006b INTERNAL/NỘI BỘ sau nhãn phân loại"
    confidence: 0.95
    context_required: false

  # NỘI BỘ kết hợp với hạn chế phổ biến — các biến thể thực tế trong dataset
  - regex: '(?i)NỘI\s*BỘ\s*[-—–]\s*(?:Không\s*phổ\s*biến|hạn\s*chế\s*phổ\s*biến|hạn\s*chế\s*lưu\s*hành|hạn\s*chế\s*phát\s*hành)'
    description: "ORG-006c NỘI BỘ + hạn chế phổ biến"
    confidence: 0.92
    context_required: false

  # INTERNAL kết hợp với hạn chế — vd: "INTERNAL — Hạn chế phổ biến"
  - regex: '(?i)INTERNAL\s*[-—–]\s*(?:Hạn\s*chế|Không\s*phổ\s*biến|restricted|limited)'
    description: "ORG-006d INTERNAL + hạn chế"
    confidence: 0.92
    context_required: false

  # Không phổ biến ra ngoài / không phát hành ra ngoài
  - regex: '(?i)không\s*(?:phổ\s*biến|phát\s*hành)\s*ra\s*ngoài'
    description: "ORG-006e không phổ biến/phát hành ra ngoài"
    confidence: 0.88
    context_required: false

  # INTERNAL standalone với word boundary — confidence thấp, cần context
  - regex: '(?i)\bINTERNAL\b'
    description: "ORG-006f INTERNAL standalone"
    confidence: 0.72
    context_required: true

keywords:
  primary:
    - "nội bộ"
    - "internal"
    - "lưu hành nội bộ"
    - "internal use only"
    - "chỉ lưu hành nội bộ"
    - "không phổ biến"
    - "không phổ biến ra ngoài"
    - "do not distribute"
    - "hạn chế phổ biến"
    - "hạn chế lưu hành"
  secondary:
    - "bảo mật"
    - "hạn chế"
    - "phát hành"
    - "circulation"
    - "VNPT"
    - "tài liệu"
    - "phân loại"
