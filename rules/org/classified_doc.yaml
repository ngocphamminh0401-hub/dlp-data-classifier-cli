# ORG-001 — Nhãn phân loại bảo mật tài liệu (Document Classification Labels)
# Theo Luật Bảo vệ Bí mật Nhà nước 2018 (Luật số 29/2018/QH14)
# và Nghị định 26/2020/NĐ-CP về phân loại tài liệu mật.
#
# TÁCH THÀNH 2 RULE ĐỂ MAP ĐÚNG LEVEL:
#   classified_doc_001  — SECRET   : TỐI MẬT, MẬT, RESTRICTED, TOP SECRET
#   classified_doc_002  — CONFIDENTIAL : CONFIDENTIAL, BÍ MẬT
#
# Lý do tách: rule cũ dùng override_level=SECRET cho tất cả nhãn kể cả
# "CONFIDENTIAL" → toàn bộ file L3 bị nâng nhầm lên RESTRICTED.

id: classified_doc_001
name: "ORG-001 Tài liệu TỐI MẬT / MẬT / RESTRICTED"
category: org
level: SECRET
weight: 0.95
priority: 95
tags: [org, classified_doc, restricted]
enabled: true

patterns:
  # TỐI MẬT / TOP SECRET xuất hiện độc lập — tín hiệu rất mạnh
  - regex: '(?i)\b(?:TỐI\s*MẬT|TOP\s*SECRET|CỰC\s*KỲ\s*BÍ\s*MẬT)\b'
    description: "ORG-001a nhãn tối mật / top secret"
    confidence: 0.97
    context_required: false
    override_level: SECRET

  # RESTRICTED / MẬT trong ngữ cảnh phân loại (gần marker "Phân loại:")
  - regex: '(?i)(?:phân\s*loại|classification|security\s*label|label)\s*[:=—\-]\s*(?:RESTRICTED|MẬT)\b'
    description: "ORG-001b RESTRICTED/MẬT sau nhãn phân loại"
    confidence: 0.96
    context_required: false
    override_level: SECRET

  # RESTRICTED standalone (word boundary) — confidence thấp hơn, cần context
  # Không match "MẬT" độc lập: từ này xuất hiện phổ biến trong "bảo mật", "mật khẩu",
  # "bí mật" → quá nhiều false positive. Chỉ match khi có tiền tố "Phân loại:" (pattern trên).
  - regex: '(?i)\bRESTRICTED\b'
    description: "ORG-001c RESTRICTED standalone"
    confidence: 0.82
    context_required: true
    override_level: SECRET

keywords:
  primary:
    - "TỐI MẬT"
    - "MẬT"
    - "TOP SECRET"
    - "RESTRICTED"
    - "tài liệu mật"
    - "bí mật nhà nước"
    - "tuyệt mật"
    - "cực mật"
    - "đóng dấu mật"
    - "strictly confidential"
    - "eyes only"
    - "need to know"
    - "highly sensitive"
  secondary:
    - "không được sao chép"
    - "lưu hành hạn chế"
    - "security classification"
    - "phân loại tài liệu"
    - "nhạy cảm cao"
    - "hạn chế tối đa"
    - "kiểm soát đặc biệt"
    - "classification level"
    - "access control"
