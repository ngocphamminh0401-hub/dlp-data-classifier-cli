# FIN-001 — Số thẻ tín dụng / ghi nợ quốc tế
# PCI-DSS v4.0 — Primary Account Number (PAN) là dữ liệu cardholder tối mật.
#
# CÁC TỔNG ĐÀI THẺ ĐƯỢC NHẬN DẠNG:
#   Visa:        4xxx xxxx xxxx xxxx (16 số, bắt đầu bằng 4)
#   Mastercard:  51-55xx / 2221-2720 (16 số)
#   Amex:        34xx / 37xx (15 số)
#   JCB:         35xx (16 số)
#   Discover:    6011 / 622126-622925 / 644-649 / 65xx (16 số)
#   UnionPay:    62xx (16-19 số)
#   Napas VN:    9704xx (16 số) — thẻ nội địa Việt Nam
#
# BẮT BUỘC: Luhn checksum validation (loại bỏ ~90% false positive).
# Không cần keyword context vì pattern đủ đặc trưng khi qua Luhn.

id: credit_card_001
name: "Thẻ tín dụng / ghi nợ quốc tế"
category: financial
level: SECRET
weight: 0.95
priority: 100
tags: [financial, credit_card, payment_card, pci_dss]
enabled: true

patterns:
  # Visa — 16 số bắt đầu bằng 4 (có thể có dấu cách / gạch ngang)
  - regex: '\b4\d{3}[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b'
    description: "Visa (bắt đầu bằng 4, 16 số)"
    confidence: 0.95
    context_required: false
    validators: [luhn]

  # Mastercard — 51-55xx hoặc 2221-2720 (16 số)
  # IIN 2221 là thấp nhất hợp lệ; 2220 không hợp lệ
  - regex: '\b(?:5[1-5]\d{2}|2(?:22[1-9]|2[3-9]\d|[3-6]\d{2}|7[01]\d|720))[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b'
    description: "Mastercard (51-55 và range 2221-2720, 16 số)"
    confidence: 0.95
    context_required: false
    validators: [luhn]

  # American Express — 15 số, bắt đầu bằng 34 hoặc 37
  - regex: '\b3[47]\d{2}[-\s]?\d{6}[-\s]?\d{5}\b'
    description: "American Express (34, 37 — 15 số)"
    confidence: 0.95
    context_required: false
    validators: [luhn]

  # JCB — bắt đầu bằng 35xx (16 số)
  - regex: '\b35(?:2[89]|[3-8]\d)\d[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b'
    description: "JCB (35xx — 16 số)"
    confidence: 0.90
    context_required: false
    validators: [luhn]

  # Discover — 6011, 622126-622925, 644-649, 65xx (16 số)
  - regex: '\b(?:6011|64[4-9]\d|65\d{2}|622(?:12[6-9]|1[3-9]\d|[2-8]\d{2}|9[01]\d|92[0-5]))[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b'
    description: "Discover (6011, 622xxx, 644-649, 65xx — 16 số)"
    confidence: 0.90
    context_required: false
    validators: [luhn]

  # Napas VN — thẻ nội địa Việt Nam (9704xx, 16 số)
  - regex: '\b9704\d{2}[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b'
    description: "Thẻ nội địa Napas Việt Nam (9704xx — 16 số)"
    confidence: 0.92
    context_required: false
    validators: [luhn]

  # UnionPay — IIN hợp lệ: 624x-626x, 628x (16-19 số, phổ biến với thẻ TQ)
  - regex: '\b(?:62[4-6]\d|628\d)[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}(?:[-\s]?\d{3})?\b'
    description: "UnionPay (624x/625x/626x/628x — 16-19 số)"
    confidence: 0.88
    context_required: false
    validators: [luhn]

keywords:
  primary:
    - "thẻ tín dụng"
    - "credit card"
    - "thẻ ghi nợ"
    - "debit card"
    - "card number"
    - "số thẻ"
    - "PAN"
  secondary:
    - "Visa"
    - "Mastercard"
    - "Amex"
    - "JCB"
    - "Napas"
    - "CVV"
    - "CVC"
    - "expiry"
    - "ngày hết hạn"
    - "valid thru"
    - "cardholder"
    - "chủ thẻ"

false_positive_reduction:
  luhn_required: true
  cvv_expiry_boost: 0.07
