# FIN-003 — Mã SWIFT / BIC (Bank Identifier Code)
# Theo tiêu chuẩn ISO 9362.
#
# CẤU TRÚC BIC:
#   [4 chữ cái bank code] + [2 chữ cái country code] + [2 ký tự location] + [3 ký tự branch (tùy chọn)]
#   Tổng: 8 hoặc 11 ký tự
#
# VÍ DỤ NGÂN HÀNG VN:
#   BFTVVNVX    — Vietcombank
#   BIDVVNVX    — BIDV
#   ICBVVNVX    — VietinBank
#   VBAAVNVX    — Agribank
#   VTCBVNVX    — Techcombank
#   MSCBVNVX    — MB Bank
#   VPBKVNVX    — VPBank
#
# Pattern 'VN' ở vị trí 5-6 bắt buộc cho ngân hàng VN.
# Pattern tổng quát (ISO 9362) cũng được include để bắt giao dịch quốc tế.

id: swift_bic_001
name: "Mã SWIFT/BIC ngân hàng"
category: financial
level: CONFIDENTIAL
weight: 0.87
priority: 65
tags: [financial, swift, bic, international_banking]
enabled: true

patterns:
  # BIC ngân hàng Việt Nam (country code = VN)
  - regex: '\b[A-Z]{4}VN[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
    description: "BIC ngân hàng Việt Nam (4 ký tự + VN + 2-5 ký tự)"
    confidence: 0.92
    context_required: false

  # BIC quốc tế (tổng quát ISO 9362) — 8 hoặc 11 ký tự
  - regex: '\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
    description: "BIC quốc tế (ISO 9362 — 8 hoặc 11 ký tự)"
    confidence: 0.75
    context_required: true

keywords:
  primary:
    - "SWIFT"
    - "BIC"
    - "SWIFT code"
    - "BIC code"
    - "swift/bic"
    - "bank identifier"
    - "mã swift"
  secondary:
    - "chuyển tiền quốc tế"
    - "international transfer"
    - "wire transfer"
    - "ngân hàng đại lý"
    - "correspondent bank"
    - "routing code"
    - "bank code"
    - "Vietcombank"
    - "BIDV"
    - "VietinBank"
    - "Agribank"

false_positive_reduction:
  min_context_window: 200
  exclude_if_no_keywords: true
