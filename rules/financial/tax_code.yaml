# FIN / ORG — Mã số thuế doanh nghiệp Việt Nam (MST DN)
# Theo Luật Quản lý Thuế 2019 và Thông tư 105/2020/TT-BTC.
#
# PHÂN LOẠI PHÁP LÝ:
#   MST doanh nghiệp 10 số — CÔNG KHAI (Luật DN 2020 Điều 216, tra cứu được trên
#   Cổng thông tin quốc gia về ĐKDN). In trên hóa đơn, hợp đồng, hồ sơ thầu.
#   → Level: INTERNAL (không phải bí mật nhưng cần kiểm soát trong hệ thống)
#
# MST cá nhân 13 số → xem tax_code_personal.yaml (CONFIDENTIAL).
#
# CẤU TRÚC MST DN:
#   Doanh nghiệp:   10 số (vd: 0100100000)
#   Chi nhánh:      10 số + gạch ngang + 3 số (vd: 0100100000-001)
#   Hộ kinh doanh:  10 số + hậu tố riêng

id: tax_code_business_001
name: "Mã số thuế doanh nghiệp / chi nhánh Việt Nam"
category: financial
level: INTERNAL
weight: 0.75
priority: 60
tags: [financial, tax_code, business_id, org_identifier]
enabled: true

patterns:
  # MST chi nhánh: 10 số + gạch ngang + 3 số — pattern đặc trưng nhất
  - regex: '\b\d{10}-\d{3}\b'
    description: "MST chi nhánh (10 số + hậu tố 3 số)"
    confidence: 0.92
    context_required: false

  # MST doanh nghiệp: 10 số (2 số đầu là mã tỉnh: 01-96)
  - regex: '\b(?:0[1-9]|[1-8]\d|9[0-6])\d{8}\b'
    description: "MST doanh nghiệp 10 số (2 số đầu là mã tỉnh/thành)"
    confidence: 0.78
    context_required: true

  # MST tổng quát 10 số (dự phòng, confidence thấp)
  - regex: '\b\d{10}\b'
    description: "MST 10 số dự phòng — yêu cầu keyword bắt buộc"
    confidence: 0.65
    context_required: true

keywords:
  primary:
    - "mã số thuế"
    - "MST"
    - "tax code"
    - "TIN"
    - "mã doanh nghiệp"
    - "mã số doanh nghiệp"
    - "MSDN"
    - "đăng ký kinh doanh"
    - "tax identification"
    - "mã số kinh doanh"
    - "business registration number"
    - "Tax No"
    - "Tax ID"
  secondary:
    - "cục thuế"
    - "chi cục thuế"
    - "hóa đơn"
    - "VAT"
    - "GTGT"
    - "thuế thu nhập doanh nghiệp"
    - "TNDN"
    - "kê khai thuế"
    - "quyết toán thuế"
    - "hoàn thuế"
    - "giấy phép kinh doanh"
    - "giấy chứng nhận đăng ký"

false_positive_reduction:
  min_context_window: 200
  exclude_if_no_keywords: true
